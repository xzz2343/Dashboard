name: Build and Deploy to IONOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to IONOS via SFTP
        env:
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
          REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          sudo apt-get install -y lftp
          REMOTE_DIR="$(echo "$REMOTE_DIR" | tr -d '[:space:]')"
          cat > /tmp/deploy.lftp << LFTP_EOF
          set sftp:auto-confirm yes
          set net:timeout 30
          set net:max-retries 3
          open -u $SFTP_USER,$SFTP_PASS sftp://access-5020765337.webspace-host.com:22
          mirror -R --delete --verbose ./dist/ $REMOTE_DIR
          quit
          LFTP_EOF
          lftp -f /tmp/deploy.lftp
